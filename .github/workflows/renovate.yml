name: Renovate
on:
  schedule:
    - cron: '0 * * * *'  # Runs at the start of every hour
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Run Renovate
        uses: renovatebot/github-action@v32.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
